name: cicd-changesets
description: "changesets"

inputs:
  # general inputs
  checkout-repo-fetch-depth:
    description: "number of commits to fetch"
    required: false
    default: "0"
  git-user:
    description: ""
    required: false
    default: app-token-issuer-infra-releng[bot]@users.noreply.github.com
  git-email:
    description: ""
    required: false
    default: app-token-issuer-infra-releng[bot]
  # token inputs
  github-token:
    description: |
      GitHub token used to checkout the repo and create/publish the release PR
      and tags. Defaults to the automatic GITHUB_TOKEN.

      This is only used when GATI is not configured (i.e. `aws-role-arn` is
      empty). When `aws-role-arn` is set, a GATI-issued token is used instead
      and this input is ignored.

      When relying on the default GITHUB_TOKEN, the calling job must grant
      `contents: write` and `pull-requests: write` permissions.
    required: false
    default: ${{ github.token }}
  # aws inputs (GATI) - optional
  # Provide these to issue a token via GATI instead of using `github-token`.
  aws-role-duration-seconds:
    description: ""
    required: false
    default: "900"
  aws-region:
    description: ""
    required: false
  aws-role-arn:
    description: ""
    required: false
  aws-lambda-url:
    description: ""
    required: false
  # nodejs inputs
  node-version-file:
    description: ""
    required: false
    default: ".tool-versions"
  pnpm-version:
    description: ""
    required: false
    default: "^10.0.0"
  pnpm-use-cache:
    description: "Use cache for pnpm"
    required: false
    default: "true"
  # changesets inputs
  changesets-publish-cmd:
    description: ""
    required: false
    default: pnpm run ci:changeset:publish
  changesets-version-cmd:
    description: ""
    required: false
    default: pnpm run ci:changeset:version
  changesets-create-gh-release:
    description: ""
    required: false
    default: "false"
  changesets-tag-separator:
    description: |
      What character to use to separate the package name and version in the tag.
      For example:
        - Using `@`, the resulting git tag will be <package>@<version>
        - Using `/`, the resulting git tag will be <package>/<version>
        - Using `/v` the resulting git tag will be <package>/v<version>
    required: false
    default: "@"
  changesets-major-version-tags:
    description: |
      Create and mutate major version tags for each package.
      Uses the same separator as above.
    required: false
    default: "false"
  changesets-root-version-package-path:
    description: |
      Path to a package.json file that should use simplified v<version> tags
      instead of <name><separator><version> tags. The package.json must have
      chainlink.changesets.rootVersion set to true. If this path is provided
      but the field is not set correctly, the action will fail.
    required: false
  pr-title:
    description: "title of the PR"
    required: false
  pr-draft:
    description: "whether to put the PR in draft mode or not"
    required: false
    default: "false"
outputs:
  published:
    description:
      A boolean value to indicate whether a publishing is happened or not
    value: ${{ steps.changesets.outputs.published }}
  publishedPackages:
    description: >
      A JSON array to present the published packages. The format is `[{"name":
      "@xx/xx", "version": "1.2.0"}, {"name": "@xx/xy", "version": "0.8.9"}]`
    value: ${{ steps.changesets.outputs.publishedPackages }}
  hasChangesets:
    description:
      A boolean about whether there were changesets. Useful if you want to
      create your own publishing functionality.
    value: ${{ steps.changesets.outputs.hasChangesets }}
  pullRequestNumber:
    description: The pull request number that was created or updated
    value: ${{ steps.changesets.outputs.pullRequestNumber }}

runs:
  using: composite
  steps:
    # GATI is optional. This step only runs when `aws-role-arn` is provided.
    # When GATI is not configured, the action falls back to `github-token`
    # (the automatic GITHUB_TOKEN by default). Using GATI requires the calling
    # job to grant `id-token: write` permission.
    - name: Setup gh token (GATI)
      id: setup-gh-token
      if: inputs.aws-role-arn != ''
      uses: smartcontractkit/.github/actions/setup-github-token@setup-github-token/v1
      with:
        aws-role-arn: ${{ inputs.aws-role-arn }}
        aws-lambda-url: ${{ inputs.aws-lambda-url }}
        aws-region: ${{ inputs.aws-region }}
        aws-role-duration-seconds: ${{ inputs.aws-role-duration-seconds }}

    # Prefer the GATI-issued token when present, otherwise use `github-token`.
    - name: Resolve gh token
      id: resolve-gh-token
      shell: bash
      env:
        GATI_TOKEN: ${{ steps.setup-gh-token.outputs.access-token }}
        GITHUB_TOKEN_INPUT: ${{ inputs.github-token }}
      run: |
        if [[ -n "${GATI_TOKEN}" ]]; then
          TOKEN="${GATI_TOKEN}"
        else
          TOKEN="${GITHUB_TOKEN_INPUT}"
        fi
        if [[ -z "${TOKEN}" ]]; then
          echo "::error::No GitHub token available. Provide GATI inputs (aws-role-arn, aws-lambda-url, aws-region) or set github-token."
          exit 1
        fi
        echo "::add-mask::${TOKEN}"
        echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

    - name: Checkout repo
      uses: actions/checkout@v7
      with:
        fetch-depth: ${{ inputs.checkout-repo-fetch-depth }}
        token: ${{ steps.resolve-gh-token.outputs.token }}

    - name: Set git config
      shell: bash
      run: |
        git config user.email "${{ inputs.git-email }}"
        git config user.name "${{ inputs.git-user }}"

    - name: Setup nodejs
      uses: smartcontractkit/.github/actions/setup-nodejs@setup-nodejs/v1
      with:
        node-version-file: ${{ inputs.node-version-file }}
        pnpm-version: ${{ inputs.pnpm-version }}
        use-cache: ${{ inputs.pnpm-use-cache }}
        run-install: "true"

    - name: Run changesets
      id: changesets
      uses: smartcontractkit/.github/actions/signed-commits@changesets-signed-commits/v1
      env:
        GITHUB_TOKEN: ${{ steps.resolve-gh-token.outputs.token }}
      with:
        publish: ${{ inputs.changesets-publish-cmd }}
        version: ${{ inputs.changesets-version-cmd }}
        createGithubReleases: ${{ inputs.changesets-create-gh-release }}
        rootVersionPackagePath:
          ${{ inputs.changesets-root-version-package-path }}
        setupGitUser: false
        title: ${{ inputs.pr-title }}
        prDraft: ${{ inputs.pr-draft }}
        tagSeparator: ${{ inputs.changesets-tag-separator }}
        createMajorVersionTags: ${{ inputs.changesets-major-version-tags }}

    - name: Check changesets output
      shell: bash
      run: |
        echo "published: ${{ steps.changesets.outputs.published }}"
        echo "publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}"
        echo "hasChangesets: ${{ steps.changesets.outputs.hasChangesets }}"
        echo "pullRequestNumber: ${{ steps.changesets.outputs.pullRequestNumber }}"
